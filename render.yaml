services:
  - type: web
    name: lyrichelp
    env: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py migrate --noinput &&
      python manage.py load_dictionary --skip-download &&
      python manage.py load_ptbr_dictionary --skip-download &&
      python manage.py collectstatic --noinput
    # Defensive startup: some manual Render services ignore blueprint build steps.
    startCommand: >
      python manage.py migrate --noinput &&
      python manage.py load_dictionary --skip-download &&
      python manage.py load_ptbr_dictionary --skip-download &&
      python manage.py collectstatic --noinput &&
      gunicorn rhymeproject.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
